name: Python + MySQL CI + Code Quality

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Wait for MySQL
      run: sleep 20

    # ✅ Code Quality Check
    - name: Run Pylint
      run: |
        pylint app.py --fail-under=7

    # ✅ Run App Test
    - name: Run App (DB Test)
      env:
        DB_HOST: 127.0.0.1
        CI: true
      run: python app.py
